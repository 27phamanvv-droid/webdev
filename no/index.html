<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Media Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Genius BIOLINK</h1>
        <p>A collection of my favorite media</p>
    </header>

    <!-- IMAGE SECTION -->
    <section class="media-section">
        <h2>Image</h2>
        <img src="images/lucks.jpg" alt="Description of your image">
    </section>

    <!-- VIDEO SECTION -->
    <section class="media-section">
        <h2>Video</h2>
        <video controls width="500">
            <source src="video/videoplayback.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </section>

    <!-- AUDIO -->
    <section class="media-section">
        <h2>Audio</h2>
        <audio controls>
            <source src="audio/luck.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <!-- IFRAME SECTION -->
    <section class="media-section">
        <h2>External Content</h2>
        <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/YOUR_VIDEO_ID" 
            title="YouTube video player" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </section>

    <footer>
        <p>Created by Your Name</p>
    </footer>

</body>
</html>
